server {
    listen 80;
    root /usr/share/nginx/html;
    client_max_body_size 32m;

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_connect_timeout 30s;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
