name: song-to-tab

services:
  backend:
    profiles:
      - basic
      - full
    build:
      context: ./backend
      args:
        INSTALL_OPTIONAL: ${INSTALL_OPTIONAL:-false}
    privileged: ${BACKEND_PRIVILEGED:-false}
    shm_size: ${BACKEND_SHM_SIZE:-64m}
    expose:
      - "8000"
    restart: unless-stopped
    volumes:
      - model-cache:/root/.cache

  frontend:
    profiles:
      - basic
      - full
    build: ./frontend
    ports:
      - "${HOST_PORT:-60901}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  model-cache:
